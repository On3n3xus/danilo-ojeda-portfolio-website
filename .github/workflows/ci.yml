name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npx playwright install --with-deps chromium
      - name: Run browser QA against the production build
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/portfolio-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            sleep 1
          done
          QA_URL=http://127.0.0.1:4173 npm run qa
      - name: Upload QA screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-screenshots
          path: .firecrawl/qa-atlas
          if-no-files-found: ignore
